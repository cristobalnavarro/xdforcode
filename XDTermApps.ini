; XDTermApps.ini — Aplicaciones que se crean como pestañas al arrancar
;
; Formato: NombrePestaña = comando, modo
;
;   modo:
;     1              = terminal ConPTY, ejecutar automáticamente al iniciar
;     0              = terminal ConPTY, botón "Start" (default si se omite)
;     shell          = app Harbour/FiveWin, etc, botón "Abrir" (ShellExecute)
;
;     http://...     = lanzar "comando" como servidor + abrir URL en WebView (manual)
;     http://..., 1  = igual pero arranca automáticamente al iniciar

[APPS]
OpenCode   = cmd.exe /k opencode, 1
; Mimo = cmd.exe /k mimo, 0
; OpenWiki = cmd.exe /k openwiki, 0
; OpenClaude = cmd.exe /k openclaude, 1
; Claude     = cmd.exe /k claude, 0
; Gemini     = cmd.exe /k gemini, 1
; OllamaTerm = cmd.exe /k ollama run deepseek-r1
; Ollama = cmd.exe /k ollama run qwen3.5:9b, 0
; OllamaWeb  = ollama serve, http://localhost:11434, 0
; DBU        = E:\webview\XDForWeb\civetweb\dbu\dbu_b_64.exe, http://localhost:8002
; HBIDE      = E:\webview\XDForWeb\civetweb\hbide\hbide_.exe, shell
[AGENTS]
OpenCode   = cmd.exe /k opencode, 1
OpenClaude = cmd.exe /k openclaude, 1
Claude     = cmd.exe /k claude, 1
Mimo       = cmd.exe /k mimo, 1
Gemini     = cmd.exe /k gemini, 1
OpenWiki   = cmd.exe /k openwiki, 1
Ollama     = cmd.exe /k ollama run qwen3.5:9b, 1

[MCPSERVERS]
codegraph = codegraph serve --mcp --path {workspace}, 1
